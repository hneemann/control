<!DOCTYPE html>
{{$tr := .Translator}}
<html lang='{{$tr.MsgID "langID" }}'>
<head>
  <meta charset="UTF-8">
  <title>{{$tr.MsgID "login_login"}}</title>
  <link rel="icon" type="image/svg" href="/assets/icon.svg">
  <link rel="stylesheet" type="text/css" href="/assets/main.css"/>
</head>
<body>
  <form action="/login" method="post">
    <table class="loginTable" style="margin-top:3em">
    <tr>
      <td colspan="2" style="font-size:115%;font-weight:bold;text-align:center">{{$tr.MsgID "login_login"}} Control</td>
    </tr>
    <tr>
      <td><label for="username">{{$tr.MsgID "login_username"}}</label></td>
      <td><input type="text" name="username" id="username" placeholder='{{$tr.MsgID "login_username"}}' autocomplete="username" required></td>
    </tr>
    <tr>
      <td><label for="password">{{$tr.MsgID "login_password"}}</label></td>
      <td><input type="password" name="password" id="password" placeholder='{{$tr.MsgID "login_password"}}' autocomplete="current-password" required></td>
    </tr>
    <tr>
      <td></td>
      <td style="text-align:right"><input type="submit" value='{{$tr.MsgID "login_login"}}'></td>
    </tr>
    {{if .Error}}
      <tr><td colspan="2" style="color:red">{{.Error}}</td></tr>
    {{end}}
    <tr>
      <td colspan="2"><a href="/register?t={{.Target}}">{{$tr.MsgID "login_register"}}</a></td>
    </tr>
    </table>
    <input type="hidden" name="target" value="{{.Target}}">
  </form>
</body>
</html>
