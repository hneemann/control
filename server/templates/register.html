<!DOCTYPE html>
{{$tr := .Translator}}
<html lang='{{$tr.MsgID "langID" }}'>
<head>
  <meta charset="UTF-8">
  <title>{{$tr.MsgID "login_register"}}</title>
  <link rel="icon" type="image/svg" href="/assets/icon.svg">
  <link rel="stylesheet" type="text/css" href="/assets/main.css"/>
</head>
<body>
<form action="/register" method="post">
  <table class="loginTable" style="margin-top:3em">
    <tr>
      <td colspan="2" style="font-size:115%;font-weight:bold;text-align:center">{{$tr.MsgID "login_register"}} Control</td>
    </tr>
    <tr>
      <td><label for="username">{{$tr.MsgID "login_username"}}</label></td>
      <td><input type="text" name="username" id="username" placeholder='{{$tr.MsgID "login_username"}}'></td>
    </tr>
    <tr>
      <td><label for="password">{{$tr.MsgID "login_password"}}</label></td>
      <td><input type="password" name="password" id="password" placeholder='{{$tr.MsgID "login_password"}}'></td>
    </tr>
    <tr>
      <td><label for="password2">{{$tr.MsgID "login_repeat"}}</label></td>
      <td><input type="password" name="password2" id="password2" placeholder='{{$tr.MsgID "login_repeat"}}'></td>
    </tr>
    <tr>
      <td></td>
      <td style="text-align:right"><input type="submit" value='{{$tr.MsgID "login_register"}}'></td>
    </tr>
    {{if .Error}}
      <tr><td colspan="2" style="color:red">{{.Error}}</td></tr>
    {{end}}
    <tr>
      <td colspan="2"><a href="/login?t={{.Target}}">{{$tr.MsgID "login_login"}}</a></td>
    </tr>
  </table>
  <input type="hidden" name="target" value="{{.Target}}">
</form>
</body>
</html>
